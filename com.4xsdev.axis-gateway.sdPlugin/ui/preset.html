<!DOCTYPE html>
<html>
<head lang="en">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
</head>
<body>
    <sdpi-item label="Camera IP">
        <sdpi-textfield setting="cameraIp" global placeholder="192.168.1.156"></sdpi-textfield>
    </sdpi-item>
    <sdpi-item label="User">
        <sdpi-textfield setting="cameraUser" global placeholder="root"></sdpi-textfield>
    </sdpi-item>
    <sdpi-item label="Password">
        <sdpi-password setting="cameraPass" global></sdpi-password>
    </sdpi-item>
    <sdpi-item label="Preset">
        <sdpi-select setting="sel" placeholder="Choose…" datasource="getPresets" loading="Loading presets…" show-refresh></sdpi-select>
    </sdpi-item>
    <sdpi-item>
        <small>Enter the camera IP, user and password (shared across all keys), then pick a preset. Tap goes to that server preset.</small>
    </sdpi-item>
</body>
</html>
